<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Toggle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../shared/base/base.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="scripts/app.js"></script>
    <script src="../shared/nav/nav.js" defer></script>
</head>
<body>
    <div class="container c-card">
        <h1 class="js-title">Language Toggle Example</h1>
        <p class="js-description">This is a basic language toggle example.</p>
        <div class="c-language__togglecontainer">
            <button class="js-language-toggle c-language__toggle c-language__toggle--active" data-lang="en">EN</button>
            <button class="js-language-toggle c-language__toggle" data-lang="nl">NL</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
